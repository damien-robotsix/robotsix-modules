[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-modules"
version = "0.2.0"
description = "Shared JSON-Schema-driven module-taxonomy validation for robotsix projects."
requires-python = ">=3.14"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Damien Robotsix" }]
dependencies = ["pyyaml>=6", "jsonschema>=4"]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-cov>=5", "ruff>=0.11", "mypy>=1.15", "deptry>=0.20", "pip-audit>=2.6.0", "bandit[toml]>=1.8"]

[project.urls]
Homepage = "https://github.com/damien-robotsix/robotsix-modules"
Repository = "https://github.com/damien-robotsix/robotsix-modules"
Issues = "https://github.com/damien-robotsix/robotsix-modules/issues"
Changelog = "https://github.com/damien-robotsix/robotsix-modules/blob/main/CHANGELOG.md"

[project.scripts]
robotsix-modules = "robotsix_modules.cli:main"
robotsix-modules-validate = "robotsix_modules.cli:validate_main"

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_modules"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py314"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]

[tool.ruff.lint.per-file-ignores]
"tests/validation/**" = ["S101", "S607"]
"tests/cli/**" = ["S101", "S607"]

[tool.mypy]
python_version = "3.14"
strict = true

[[tool.mypy.overrides]]
module = ["yaml", "jsonschema", "jsonschema.*"]
ignore_missing_imports = true

[tool.deptry]
known_first_party = ["robotsix_modules"]

[tool.deptry.per_rule_ignores]
DEP002 = ["pytest", "pytest-cov", "ruff", "mypy", "deptry", "pip-audit", "bandit"]

[tool.bandit]
exclude_dirs = ["tests/validation", "tests/cli"]
skips = ["B101"]

[tool.coverage.run]
branch = true
relative_files = true
source = ["robotsix_modules"]
