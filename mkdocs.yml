site_name: robotsix-modules
site_description: Shared JSON-Schema-driven module-taxonomy validation for robotsix projects.
repo_url: https://github.com/damien-robotsix/robotsix-modules
strict: true
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
theme:
  name: material
hooks:
  - mkdocs_hooks.py
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
nav:
  - Home: index.md
  - Schema Reference: schema-reference.md
  - CLI: cli/usage.md
  - API Reference: validation/api.md
  - Code of Conduct: CODE_OF_CONDUCT.md
  - Contributing: CONTRIBUTING.md
