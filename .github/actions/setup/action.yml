name: Setup
inputs:
  python-version:
    required: true
    type: string
  sync-args:
    description: 'Arguments to pass to uv sync. Set to empty string to skip sync.'
    default: '--locked --group dev'
    type: string
runs:
  using: composite
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}
    - if: ${{ inputs.sync-args != '' }}
      shell: bash
      env:
        UV_MALWARE_CHECK: "1"
      run: uv sync ${{ inputs.sync-args }}
      run: uv sync ${{ inputs.sync-args }}
