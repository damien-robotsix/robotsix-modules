name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@7338e0580335ed4fe01c30f79276c29e84dfbcc2
    with:
      python-version: "3.14"
      cov-package: "robotsix_modules"
      coverage-threshold: "90"
      run-bandit: true
      mypy-advisory: false
    secrets: inherit

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
      - run: uv sync --frozen --group dev
      - run: uv run vulture src/ vulture_whitelist.py

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
      - run: uv sync --frozen --group dev
      - name: Check version consistency
        run: |
          PYPROJECT=$(uv run python -c "from tomllib import load; print(load(open('pyproject.toml','rb'))['project']['version'])")
          INIT=$(uv run python -c "from robotsix_modules import __version__; print(__version__)")
          CHANGELOG=$(grep -oP '^## \[\K[^\]]+' CHANGELOG.md | head -1)
          TEST=$(grep -oP 'robotsix-modules \K\d+\.\d+\.\d+' tests/cli/test_cli.py)
          if [ "$PYPROJECT" != "$INIT" ] || [ "$PYPROJECT" != "$CHANGELOG" ] || [ "$PYPROJECT" != "$TEST" ]; then
            echo "Version mismatch detected"
            echo "  pyproject.toml:   $PYPROJECT"
            echo "  __init__.py:      $INIT"
            echo "  CHANGELOG.md:     $CHANGELOG"
            echo "  tests/cli/test:   $TEST"
            exit 1
          fi

  wheel-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
      - name: Build wheel
        run: uv build --wheel
      - name: Install wheel into a clean environment
        run: |
          uv venv --python 3.14 wheel-env
          uv pip install --python wheel-env \
            dist/*.whl \
            "robotsix-yaml-config @ git+https://github.com/damien-robotsix/robotsix-yaml-config.git"
      - name: Smoke-test the console entry point
        run: ./wheel-env/bin/robotsix-modules --version

  sbom:
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
      - run: uv sync --frozen --group dev
      - run: uv run pip-audit --format cyclonedx-json --output sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@7338e0580335ed4fe01c30f79276c29e84dfbcc2
    secrets: inherit
