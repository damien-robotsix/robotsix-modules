name: CI
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  check:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a
    with:
      python-version: "3.14"
      cov-package: "robotsix_modules"
      coverage-threshold: "90"
      run-bandit: true
      mypy-advisory: false
    secrets: inherit

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv sync --locked --group dev
      - run: uv run vulture src/ vulture_whitelist.py

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv sync --locked --group dev
      - run: uv run zizmor --format sarif . --output zizmor-results.sarif
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        if: always()
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv run --with gitleaks gitleaks detect --source . --verbose --no-git

  validate-pyproject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv sync --locked --group dev && uv run validate-pyproject

  mkdocs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv sync --locked --group docs
      - run: uv run mkdocs build --strict

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv sync --locked --group dev
      - name: Check version consistency
        run: |
          PYPROJECT=$(uv run python -c "from tomllib import load; print(load(open('pyproject.toml','rb'))['project']['version'])")
          CHANGELOG=$(grep -oP '^## \[\K[^\]]+' CHANGELOG.md | head -1)
          README_VER=$(grep -oP 'v\d+\.\d+\.\d+' README.md | head -3 | sort -u)
          SECURITY_VER=$(grep -oP '\*\*v\d+\.\d+\.\d+\*\*' SECURITY.md | grep -oP '\d+\.\d+\.\d+')
          if [ "$PYPROJECT" != "$CHANGELOG" ] || echo "$README_VER" | grep -qvF "$PYPROJECT" || [ "$PYPROJECT" != "$SECURITY_VER" ]; then
            echo "Version mismatch detected"
            echo "  pyproject.toml:   $PYPROJECT"
            echo "  CHANGELOG.md:     $CHANGELOG"
            echo "  README.md:        $README_VER"
            echo "  SECURITY.md:      $SECURITY_VER"
            exit 1
          fi

  wheel-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - name: Build wheel
        run: uv build --wheel
      - name: Install wheel into a clean environment
        run: |
          uv venv --python 3.14 wheel-env
          uv pip install --python wheel-env \
            dist/*.whl \
            "robotsix-yaml-config @ git+https://github.com/damien-robotsix/robotsix-yaml-config.git@d302ee4ada88905efa48333894ed19519f9f7920"
      - name: Smoke-test the installed wheel
        run: |
          ./wheel-env/bin/python -c "import robotsix_modules; print('import ok:', robotsix_modules.__version__)"
          ./wheel-env/bin/robotsix-modules --help
          ./wheel-env/bin/robotsix-modules validate \
            "${{ github.workspace }}/tests/cli/fixtures/valid_modules.yaml"
      - name: Dogfood — validate the real modules.yaml
        run: ./wheel-env/bin/robotsix-modules validate \
          "${{ github.workspace }}/docs/modules.yaml"

  sbom:
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv sync --locked && uv audit
      - run: uv export --format cyclonedx1.5 --output-file sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

  security:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@5cd8c1facb02299da618979e7a55f1953f9c075a
    secrets: inherit
