name: CI
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  check:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a
    with:
      python-version: "3.14"
      cov-package: "robotsix_modules"
      coverage-threshold: "90"
      run-bandit: true
      mypy-advisory: false

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
          sync-args: ""
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  vulture:
    name: Vulture dead code scan
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv run vulture src/ vulture_whitelist.py

  changelog-fragment:
    name: Changelog fragment check
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv run towncrier check
      - name: Validate fragment types
        run: |
          python -c "
import tomllib, sys, re
from pathlib import Path
with open('pyproject.toml', 'rb') as f:
    d = tomllib.load(f)
types = {t['directory'] for t in d.get('tool', {}).get('towncrier', {}).get('type', [])}
errors = []
for p in Path('changelog.d').iterdir():
    if p.name == '.gitkeep' or p.is_dir():
        continue
    # Match <timestamp>-<slug>.<type>.md
    m = re.match(r'.+?\.(\w+)\.md$', p.name)
    if m and m.group(1) not in types:
        errors.append(f'{p.name}: unknown type \"{m.group(1)}\" (valid: {sorted(types)})')
if errors:
    print('Fragment type validation failed:', file=sys.stderr)
    for e in errors:
        print(f'  {e}', file=sys.stderr)
    sys.exit(1)
print('All fragment types valid.')
          "

  zizmor:
    name: Zizmor workflow audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # needed for SARIF upload
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv run zizmor --format sarif . --output zizmor-results.sarif
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        if: always()
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor

  gitleaks:
    name: Gitleaks secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
          sync-args: ""
      - run: uv run --with gitleaks gitleaks detect --source . --verbose --no-git

  validate-pyproject:
    name: Validate pyproject.toml
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv run validate-pyproject

  mkdocs-build:
    name: MkDocs build
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
          sync-args: "--locked --group docs"
      - run: uv run mkdocs build --strict

  version-check:
    name: Version consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - name: Check version consistency
        run: |
          PYPROJECT=$(uv run python -c "from tomllib import load; print(load(open('pyproject.toml','rb'))['project']['version'])")
          CHANGELOG=$(grep -oP '^## \[\K[^\]]+' CHANGELOG.md | head -1)
          README_VER=$(grep -oP 'v\d+\.\d+\.\d+' README.md | head -3 | sort -u)
          SECURITY_VER=$(grep -oP '\*\*v\d+\.\d+\.\d+\*\*' SECURITY.md | grep -oP '\d+\.\d+\.\d+')
          if [ "$PYPROJECT" != "$CHANGELOG" ] || echo "$README_VER" | grep -qvF "$PYPROJECT" || [ "$PYPROJECT" != "$SECURITY_VER" ]; then
            echo "Version mismatch detected"
            echo "  pyproject.toml:   $PYPROJECT"
            echo "  CHANGELOG.md:     $CHANGELOG"
            echo "  README.md:        $README_VER"
            echo "  SECURITY.md:      $SECURITY_VER"
            exit 1
          fi

  check-registration:
    name: Check module registration
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
      - run: uv run robotsix-modules check-registration docs/modules.yaml --root .

  wheel-install:
    name: Wheel install smoketest
    runs-on: ubuntu-latest
    env:
      WORKSPACE: ${{ github.workspace }}
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
          sync-args: ""
      - name: Build wheel
        run: uv build --wheel
      - name: Install wheel into a clean environment
        run: |
          uv venv --python 3.14 wheel-env
          uv pip install --python wheel-env \
            dist/*.whl
      - name: Smoke-test the installed wheel
        run: |
          ./wheel-env/bin/python -c "import robotsix_modules; print('import ok:', robotsix_modules.__version__)"
          ./wheel-env/bin/robotsix-modules --help
          ./wheel-env/bin/robotsix-modules validate \
            "$WORKSPACE/tests/cli/fixtures/valid_modules.yaml"
      - name: Dogfood — validate the real modules.yaml
        run: ./wheel-env/bin/robotsix-modules validate \
          "$WORKSPACE/docs/modules.yaml"

  sbom:
    name: SBOM + audit
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - uses: ./.github/actions/setup
        with:
          python-version: "3.14"
          sync-args: "--locked"
      - run: uv audit
      - run: uv export --format cyclonedx1.5 --output-file sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

  security:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@5cd8c1facb02299da618979e7a55f1953f9c075a
