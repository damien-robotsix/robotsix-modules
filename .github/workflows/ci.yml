name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev
      - name: Check version consistency
        run: |
          PYPROJECT=$(uv run python -c "from tomllib import load; print(load(open('pyproject.toml','rb'))['project']['version'])")
          INIT=$(uv run python -c "from robotsix_modules import __version__; print(__version__)")
          CHANGELOG=$(grep -oP '^## \[\K[^\]]+' CHANGELOG.md | head -1)
          TEST=$(grep -oP 'robotsix-modules \K\d+\.\d+\.\d+' tests/cli/test_cli.py)
          if [ "$PYPROJECT" != "$INIT" ] || [ "$PYPROJECT" != "$CHANGELOG" ] || [ "$PYPROJECT" != "$TEST" ]; then
            echo "Version mismatch detected"
            echo "  pyproject.toml:   $PYPROJECT"
            echo "  __init__.py:      $INIT"
            echo "  CHANGELOG.md:     $CHANGELOG"
            echo "  tests/cli/test:   $TEST"
            exit 1
          fi
      - run: uv run pip-audit --strict --vulnerability-service osv --desc
      - run: uv run bandit -c pyproject.toml -r src/
      - run: uv run deptry .
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src tests
      - run: uv run pytest --cov --cov-branch --cov-report=xml --cov-report=term-missing --cov-fail-under=80
      - if: ${{ always() && matrix.python-version == '3.13' }}
        run: uv run pip-audit --format cyclonedx-json --output sbom.json
      - if: ${{ always() && matrix.python-version == '3.13' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.json
