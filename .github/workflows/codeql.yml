name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    strategy:
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@9c091bb8a8a4ff02b44f04232c9f21c993bb5b85  # v7.0.0
      - uses: github/codeql-action/init@71d2c6fa467d7b140356e1ba3f3fe4d1cd1dbf9a  # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/analyze@71d2c6fa467d7b140356e1ba3f3fe4d1cd1dbf9a  # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
